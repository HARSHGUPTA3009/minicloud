version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: minicloud-postgres
    environment:
      POSTGRES_DB: minicloud
      POSTGRES_USER: minicloud
      POSTGRES_PASSWORD: minicloud_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minicloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minicloud-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: minicloud-worker
    entrypoint: ["node"]
    command: ["/app/backend/dist/backend/src/workers/build.worker.js"]
    environment:
      DATABASE_URL: postgresql://minicloud:minicloud_secret@postgres:5432/minicloud
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      BASE_DOMAIN: localhost
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - build_cache:/tmp/builds
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: minicloud-backend
    environment:
      DATABASE_URL: postgresql://minicloud:minicloud_secret@postgres:5432/minicloud
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      BASE_DOMAIN: localhost
      PORT: "3001"
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - build_cache:/tmp/builds
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
        - "host.docker.internal:host-gateway"
  frontend:
    build:
      context: ./frontend
    container_name: minicloud-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: minicloud-cloudflared
    command: tunnel --no-autoupdate --url http://minicloud-backend:3001
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: minicloud_default
    external: true

volumes:
  postgres_data:
  redis_data:
  build_cache:
